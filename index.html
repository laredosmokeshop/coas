<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Certificates of Analysis</title>
<meta name="description" content="Lab-tested Certificates of Analysis (COAs)." />
<style>
  /* ============================================================
     CONFIG — only thing you might want to tweak is the page title
     and the heading below. Filenames drive everything else.
     ============================================================ */
  :root {
    --fg: #111;
    --muted: #6b6b6b;
    --line: #e5e5e5;
    --bg: #ffffff;
    --accent: #111;
    --radius: 10px;
    --maxw: 760px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .sub {
    color: var(--muted);
    font-size: 14px;
    margin: 0;
  }
  .search {
    margin: 24px 0 8px;
  }
  .search input {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fafafa;
    color: var(--fg);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .search input:focus {
    border-color: var(--accent);
    background: #fff;
  }
  .status {
    color: var(--muted);
    font-size: 14px;
    padding: 24px 0;
    text-align: center;
  }
  .product {
    margin-top: 32px;
  }
  .product h2 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
    letter-spacing: -0.005em;
  }
  .batches {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .batch {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: var(--fg);
    transition: background 0.12s;
  }
  .batch:hover {
    background: #fafafa;
  }
  .batch:last-child {
    border-bottom: none;
  }
  .batch-info {
    min-width: 0;
    flex: 1;
  }
  .batch-id {
    font-weight: 500;
    font-size: 15px;
    margin: 0 0 2px;
    word-break: break-word;
  }
  .batch-date {
    color: var(--muted);
    font-size: 13px;
    margin: 0;
  }
  .batch-arrow {
    color: var(--muted);
    font-size: 18px;
    flex-shrink: 0;
  }
  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  @media (max-width: 480px) {
    .wrap { padding: 24px 16px 60px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Certificates of Analysis</h1>
      <p class="sub">Lab-tested results for every batch. Tap any entry to view the full report.</p>
    </header>

    <div class="search">
      <input type="search" id="searchInput" placeholder="Search product or batch..." aria-label="Search COAs" />
    </div>

    <div id="status" class="status">Loading COAs...</div>
    <div id="content"></div>

    <footer>
      <span id="count"></span>
    </footer>
  </div>

<script>
/* ============================================================
   CONFIGURATION — EDIT THESE TWO LINES AFTER YOU CREATE YOUR REPO
   ============================================================ */
const GITHUB_USER = "laredosmokeshop";   // e.g. "santiagorivas"
const GITHUB_REPO = "coas";                    // the repo name you create
const COA_FOLDER  = "coas";                    // folder inside the repo holding PDFs
/* ============================================================ */

const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${COA_FOLDER}`;

/**
 * Filename convention:
 *   ProductName__BatchNumber__YYYY-MM-DD.pdf
 *
 * Use hyphens for spaces in product names. Examples:
 *   Blue-Dream__B1234__2026-04-15.pdf  -> "Blue Dream", batch B1234, 2026-04-15
 *   OG-Kush__LOT-9981__2026-03-22.pdf  -> "OG Kush", batch LOT-9981, 2026-03-22
 *   Gummies-25mg__G-44__2026-04-01.pdf -> "Gummies 25mg", batch G-44, 2026-04-01
 */
function parseFilename(name) {
  const base = name.replace(/\.pdf$/i, "");
  const parts = base.split("__");
  if (parts.length < 3) {
    return { product: base.replace(/-/g, " "), batch: "—", date: "" };
  }
  const product = parts[0].replace(/-/g, " ").trim();
  const batch = parts[1].trim();
  const date = parts[2].trim();
  return { product, batch, date };
}

function formatDate(iso) {
  if (!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso || "";
  const [y, m, d] = iso.split("-").map(Number);
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[m - 1]} ${d}, ${y}`;
}

function groupByProduct(items) {
  const groups = {};
  for (const it of items) {
    if (!groups[it.product]) groups[it.product] = [];
    groups[it.product].push(it);
  }
  // Sort batches inside each product newest-first
  for (const k in groups) {
    groups[k].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  }
  // Sort product names alphabetically
  return Object.keys(groups).sort().map(k => ({ product: k, batches: groups[k] }));
}

let ALL_ITEMS = [];

function render(filter = "") {
  const content = document.getElementById("content");
  const status  = document.getElementById("status");
  const count   = document.getElementById("count");

  const f = filter.trim().toLowerCase();
  const filtered = f
    ? ALL_ITEMS.filter(it =>
        it.product.toLowerCase().includes(f) ||
        it.batch.toLowerCase().includes(f) ||
        (it.date || "").includes(f))
    : ALL_ITEMS;

  if (filtered.length === 0) {
    status.style.display = "block";
    status.textContent = f ? "No matches." : "No COAs found yet.";
    content.innerHTML = "";
    count.textContent = "";
    return;
  }

  status.style.display = "none";
  const groups = groupByProduct(filtered);

  content.innerHTML = groups.map(g => `
    <section class="product">
      <h2>${escapeHtml(g.product)}</h2>
      <ul class="batches">
        ${g.batches.map(b => `
          <li>
            <a class="batch" href="${escapeAttr(b.url)}" target="_blank" rel="noopener">
              <div class="batch-info">
                <p class="batch-id">Batch ${escapeHtml(b.batch)}</p>
                <p class="batch-date">${escapeHtml(formatDate(b.date))}</p>
              </div>
              <span class="batch-arrow" aria-hidden="true">&rsaquo;</span>
            </a>
          </li>
        `).join("")}
      </ul>
    </section>
  `).join("");

  count.textContent = `${filtered.length} COA${filtered.length === 1 ? "" : "s"} shown`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

async function load() {
  const status = document.getElementById("status");
  try {
    const res = await fetch(API_URL, { headers: { "Accept": "application/vnd.github.v3+json" } });
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const files = await res.json();
    ALL_ITEMS = files
      .filter(f => f.type === "file" && /\.pdf$/i.test(f.name))
      .map(f => ({ ...parseFilename(f.name), url: f.download_url, file: f.name }))
      .sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    render();
  } catch (err) {
    console.error(err);
    status.textContent = "Couldn't load COAs. Check the GITHUB_USER and GITHUB_REPO values in index.html.";
  }
}

document.getElementById("searchInput").addEventListener("input", e => render(e.target.value));
load();
</script>
</body>
</html>
